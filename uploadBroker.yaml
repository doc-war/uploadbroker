listen: 127.0.0.1:0
base_url: http://localhost
url_blake2b_salts:
  - dev-salt
url_prefix: tmp
metadata_db: ./data/broker.db
cleanup_interval: 10m
default_ttl: 24h

hmac_secret: ""

limits:
  image: 2MB
  audio: 3MB
  video: 10MB
  document: 2MB

# 存储驱动配置
# upload_driver 决定写入用哪个 driver 名称，读取按 rec.Backend 自动路由。
# 所有 driver 统一用 provider 区分类型：local / s3
storage:
  upload_driver: local
  drivers:
    local:
      provider: local
      root: ./data/objects
    # s3:
    #   provider: s3
    #   endpoint: s3.ap-northeast-1.amazonaws.com
    #   bucket: my-bucket
    #   region: ap-northeast-1
    #   access_key_id: xxx
    #   secret_access_key: xxx
    #   # secure: true   # 默认 true，显式 false 使用 HTTP
